<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Veterinária Alpha Vet</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b4414">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./assets/img/logopwa.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif']
                    },
                    colors: {
                        primary: '#1b4414',
                        dark: '#122a0d'
                    }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .btn-grad {
            background: linear-gradient(135deg, #1b4414 0%, #2d6a24 100%);
        }
    </style>
</head>

<body class="font-montserrat text-gray-800 bg-[#f8faf7]">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">

            <span class="font-extrabold text-primary text-xl uppercase">
                Alpha Vet
            </span>

            <div class="space-x-6 font-bold text-[10px]">
                <a href="#home" class="text-primary border-b-2 border-primary">
                    HOME
                </a>

                <a href="#servicos" class="text-gray-400 hover:text-primary transition">
                    SERVIÇOS
                </a>
            </div>
        </div>
    </nav>

    <section id="home" class="py-12 px-6 max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-10">

        <div class="md:w-1/2">

            <h1 class="text-4xl md:text-5xl font-extrabold text-dark leading-tight">

                Cuidado especializado para quem você
                <span class="text-primary italic">ama.</span>
            </h1>

            <p class="mt-4 text-gray-600 text-lg">
                Produtos e serviços com padrão Alpha Vet.
            </p>

            <a href="#servicos"
                class="inline-block mt-8 px-10 py-4 btn-grad text-white rounded-2xl font-bold shadow-lg">

                VER CATÁLOGO
            </a>
        </div>

        <div class="md:w-1/2 flex justify-center">

            <img src="./assets/img/logo.png" alt="Alpha Vet" class="w-full max-w-sm drop-shadow-2xl">
        </div>
    </section>

    <section id="servicos" class="max-w-6xl mx-auto p-6 md:p-12 bg-white rounded-[40px] shadow-sm mb-20">

        <h2 class="text-3xl font-extrabold text-center mb-8">
            Nossos Serviços e Produtos
        </h2>

        <nav id="nav-categoria" class="overflow-x-auto flex gap-2 pb-6 mb-8 border-b border-gray-100 no-scrollbar">
        </nav>

        <div id="produtos-container">

            <div id="categoria-titulo"
                class="text-left text-dark font-extrabold text-2xl mb-8 border-l-8 border-primary pl-4 uppercase">

                Carregando...
            </div>

            <div id="lista-produtos" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center p-12">

        <p class="font-bold uppercase tracking-widest text-[10px] opacity-70">
            Alpha Vet 🐾 2026
        </p>
    </footer>

    <div id="detalhes-modal"
        class="fixed inset-0 bg-black/70 z-[100] flex justify-center items-center opacity-0 pointer-events-none transition-all px-4">

        <div class="bg-white w-full max-w-[400px] rounded-[35px] overflow-hidden">

            <div class="relative h-64 bg-gray-50 p-10 flex justify-center items-center">

                <button onclick="fecharModalDetalhes()"
                    class="absolute top-5 right-5 bg-white w-10 h-10 rounded-full font-bold shadow-md">

                    &times;
                </button>

                <img id="detalhes-img" src="" class="max-h-full object-contain">
            </div>

            <div class="p-8">

                <h2 id="detalhes-nome" class="text-2xl font-extrabold text-dark">
                </h2>

                <p id="detalhes-preco" class="text-2xl font-extrabold text-primary mt-2">
                </p>

                <div id="detalhes-desc" class="bg-gray-50 rounded-2xl p-4 mt-4 text-gray-500 text-sm italic">
                </div>

                <button id="detalhes-btn-add"
                    class="w-full btn-grad text-white py-4 rounded-2xl text-lg font-bold mt-8">

                    Adicionar ao Pedido
                </button>
            </div>
        </div>
    </div>

    <div id="carrinho-footer"
        class="fixed bottom-0 left-0 w-full bg-primary text-white p-4 z-[90] shadow-2xl transform translate-y-full transition-transform flex justify-between items-center cursor-pointer"
        onclick="abrirModalCarrinho()">

        <div class="pl-4">

            <p class="text-xs opacity-70 font-bold uppercase">
                Total
            </p>

            <p id="carrinho-total" class="text-xl font-black">
                R$ 0,00
            </p>
        </div>

        <button class="bg-white text-primary px-8 py-2 rounded-xl font-bold mr-4">

            REVISAR
        </button>
    </div>

    <div id="carrinho-modal"
        class="fixed inset-0 bg-black/60 z-[110] flex flex-col justify-end items-center opacity-0 pointer-events-none transition-all">

        <div id="carrinho-modal-content"
            class="bg-white w-full max-w-[500px] max-h-[85vh] rounded-t-[40px] flex flex-col transform translate-y-full transition-all">

            <div class="p-6 border-b flex justify-between items-center">

                <h2 class="text-xl font-extrabold uppercase">
                    Meu Pedido
                </h2>

                <button onclick="fecharModalCarrinho()" class="text-3xl">

                    &times;
                </button>
            </div>

            <div id="carrinho-itens-container" class="p-6 flex-1 overflow-y-auto flex flex-col gap-3">
            </div>

            <div class="p-8 border-t bg-gray-50">

                <div class="flex justify-between items-center mb-6">

                    <span class="text-gray-400 font-bold">
                        TOTAL:
                    </span>

                    <span id="modal-carrinho-total" class="text-3xl font-extrabold text-primary">

                        R$ 0,00
                    </span>
                </div>

                <input type="text" id="cliente-nome" placeholder="Seu Nome Completo"
                    class="w-full mb-3 p-3 border border-gray-300 rounded-lg outline-none focus:border-primary">

                <input type="text" id="cliente-endereco" placeholder="Endereço de Entrega"
                    class="w-full mb-4 p-3 border border-gray-300 rounded-lg outline-none focus:border-primary">

                <button onclick="finalizarPedido()" id="btn-fechar-pedido"
                    class="w-full btn-grad text-white py-4 rounded-2xl text-lg font-bold">

                    Fechar Pedido
                </button>
            </div>
        </div>
    </div>

    <script>
        // Centraliza tudo para a API própria da Alpha Vet para não corromper os dados
        const API_URL = 'https://backend-alphavet.vercel.app/api';

        let carrinho = [];
        let categoriaData = [];

        // 1. Carrega as categorias da API Alpha Vet
        async function carregarCategoria() {
            try {
                const res = await fetch(`${API_URL}/categorias`);
                categoriaData = await res.json();
                renderizarBotoes();

                if (categoriaData.length > 0) {
                    selecionarCategoria(categoriaData[0].id, categoriaData[0].nome);
                }
            } catch (e) {
                console.error("Erro categorias", e);
            }
        }

        // 2. Renderiza os botões de categorias
        function renderizarBotoes() {
            const nav = document.getElementById('nav-categoria');
            nav.innerHTML = '';

            categoriaData.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "px-6 py-2 rounded-full font-bold text-xs bg-gray-100 text-dark transition-all btn-cat flex-shrink-0";
                btn.innerText = cat.nome;
                btn.onclick = () => selecionarCategoria(cat.id, cat.nome);
                btn.dataset.id = cat.id;
                nav.appendChild(btn);
            });
        }

        // 3. Gerencia a seleção de categorias
        async function selecionarCategoria(id, nome) {
            document.getElementById('categoria-titulo').innerText = nome;

            document.querySelectorAll('.btn-cat').forEach(btn => {
                if (btn.dataset.id == id) {
                    btn.classList.add('bg-primary', 'text-white');
                    btn.classList.remove('bg-gray-100', 'text-dark');
                } else {
                    btn.classList.remove('bg-primary', 'text-white');
                    btn.classList.add('bg-gray-100', 'text-dark');
                }
            });

            carregarProdutos(id);
        }

        // 4. Carrega os produtos da categoria selecionada
        async function carregarProdutos(categoriaId) {
            const lista = document.getElementById('lista-produtos');
            lista.innerHTML = '<p class="col-span-full text-center py-10">Buscando...</p>';

            try {
                const res = await fetch(`${API_URL}/produtos`);
                const todos = await res.json();

                const filtrados = todos.filter(p =>
                    (p.categoria_id || p.categoriaid || p.categoriaId) == categoriaId
                );

                renderizarProdutos(filtrados);
            } catch (e) {
                lista.innerHTML = '<p class="col-span-full text-center py-10 text-red-500">Erro ao carregar.</p>';
            }
        }

        // 5. Desenha os cards na tela isolando os preços individuais de forma fixa
        function renderizarProdutos(produtos) {
            const lista = document.getElementById('lista-produtos');
            lista.innerHTML = produtos.length
                ? ''
                : '<p class="col-span-full text-center py-10">Nenhum item encontrado.</p>';

            produtos.forEach(p => {
                const img = p.imagem && p.imagem.startsWith('http')
                    ? p.imagem
                    : `./assets/img/${p.imagem || 'logo.png'}`;

                // Força a conversão para número decimal puro aqui para não misturar escopo
                const precoFixoItem = parseFloat(p.preco) || 0;
                const nomeFixoItem = p.nome;
                const idFixoItem = String(p.id);
                const descFixoItem = p.descricao || '';

                const card = document.createElement('div');
                card.className = "bg-white rounded-[30px] p-4 shadow-sm border border-gray-50 flex flex-col";

                card.innerHTML = `
                    <div class="h-32 flex justify-center items-center mb-4 cursor-pointer img-container">
                        <img src="${img}" class="max-h-full max-w-full object-contain">
                    </div>
                    <h4 class="font-bold text-dark text-[10px] uppercase h-8 overflow-hidden">
                        ${nomeFixoItem}
                    </h4>
                    <p class="text-primary font-extrabold text-lg">
                        R$ ${precoFixoItem.toFixed(2).replace('.', ',')}
                    </p>
                    <button class="w-full bg-primary text-white py-3 rounded-xl text-[10px] font-bold mt-4 btn-add-produto">
                        ADICIONAR
                    </button>
                `;

                // Garante que o clique abre os detalhes corretos com valores imutáveis
                card.querySelector('.img-container').onclick = () => {
                    abrirModalDetalhes(nomeFixoItem, precoFixoItem, descFixoItem, img, idFixoItem);
                };

                // Garante que o botão adiciona o preço nativo e imutável do card clicado
                card.querySelector('.btn-add-produto').onclick = () => {
                    adicionarItem(idFixoItem, nomeFixoItem, precoFixoItem);
                };

                lista.appendChild(card);
            });
        }

        // 6. Adiciona ao carrinho agrupando corretamente e tratando duplicados
        function adicionarItem(id, nome, preco) {
            const index = carrinho.findIndex(item => String(item.id) === String(id));
            const precoNum = parseFloat(preco) || 0;

            if (index !== -1) {
                carrinho[index].quantidade++;
            } else {
                carrinho.push({
                    id: String(id),
                    nome: nome,
                    preco: precoNum, // Preço fixo numérico
                    quantidade: 1
                });
            }
            atualizarCarrinho();
        }

        // 7. Atualiza os totais e a visibilidade do footer do carrinho
        function atualizarCarrinho() {
            const total = carrinho.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);

            const totalFormatado = total.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            });

            document.getElementById('carrinho-total').innerText = totalFormatado;
            document.getElementById('modal-carrinho-total').innerText = totalFormatado;

            document.getElementById('carrinho-footer').classList.toggle(
                'translate-y-full',
                carrinho.length === 0
            );

            renderizarListaCarrinho();
        }

        // 8. Lista os itens de revisão dentro do Modal do carrinho (CORRIGIDO)
function renderizarListaCarrinho() {
    const container = document.getElementById('carrinho-itens-container');
    container.innerHTML = '';

    carrinho.forEach(item => {
        const divItem = document.createElement('div');
        divItem.className = "flex justify-between items-center bg-gray-50 p-4 rounded-2xl";

        // Calcula o preço total deste item específico (Preço unitário x Quantidade dele)
        const precoTotalDoItem = item.preco * item.whitespace_modifier ? item.preco * item.quantidade : item.preco * item.whitespace_modifier ? item.preco * item.quantidade : item.preco * item.quantidade;

        divItem.innerHTML = `
            <div>
                <p class="font-bold text-[10px] uppercase">${item.nome}</p>
                <p class="text-xs text-primary font-bold">R$ ${precoTotalDoItem.toFixed(2).replace('.', ',')}</p>
            </div>
            <div class="flex items-center gap-3">
                <button class="w-6 h-6 bg-white rounded shadow btn-menos">-</button>
                <span class="font-bold text-sm">${item.quantidade}</span>
                <button class="w-6 h-6 bg-white rounded shadow btn-mais">+</button>
            </div>
        `;

        divItem.querySelector('.btn-menos').onclick = () => alterarQuantidade(item.id, -1);
        divItem.querySelector('.btn-mais').onclick = () => alterarQuantidade(item.id, 1);

        container.appendChild(divItem);
    });
}

        // 9. Controla incremento/decremento das quantidades
        function alterarQuantidade(id, valorAlteracao) {
            const index = carrinho.findIndex(item => String(item.id) === String(id));

            if (index !== -1) {
                carrinho[index].quantidade += valorAlteracao;

                if (carrinho[index].quantidade <= 0) {
                    carrinho.splice(index, 1);
                }
                atualizarCarrinho();
            }
        }

        // 10. Controladores de Modais
        function abrirModalDetalhes(nome, preco, descricao, imagemUrl, id) {
            const precoNum = parseFloat(preco) || 0;

            document.getElementById('detalhes-nome').innerText = nome;
            document.getElementById('detalhes-preco').innerText = `R$ ${precoNum.toFixed(2).replace('.', ',')}`;
            document.getElementById('detalhes-desc').innerText = descricao || "Sem descrição.";
            document.getElementById('detalhes-img').src = imagemUrl;

            document.getElementById('detalhes-btn-add').onclick = () => {
                adicionarItem(id, nome, precoNum);
                fecharModalDetalhes();
            };

            document.getElementById('detalhes-modal').classList.remove('opacity-0', 'pointer-events-none');
        }

        function fecharModalDetalhes() {
            document.getElementById('detalhes-modal').classList.add('opacity-0', 'pointer-events-none');
        }

        function abrirModalCarrinho() {
            document.getElementById('carrinho-modal').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('carrinho-modal-content').classList.remove('translate-y-full');
        }

        function fecharModalCarrinho() {
            document.getElementById('carrinho-modal-content').classList.add('translate-y-full');
            setTimeout(() => {
                document.getElementById('carrinho-modal').classList.add('opacity-0', 'pointer-events-none');
            }, 300);
        }

        // 11. Salva o pedido mapeando os inputs perfeitamente para a sua API Alpha Vet
        async function finalizarPedido() {
            if (carrinho.length === 0) {
                alert("Seu carrinho está vazio!");
                return;
            }

            const nomeCliente = document.getElementById('cliente-nome').value.trim();
            const enderecoCliente = document.getElementById('cliente-endereco').value.trim();

            if (!nomeCliente || !enderecoCliente) {
                alert("Por favor, informe seu nome e endereço de entrega!");
                return;
            }

            const totalNumerico = carrinho.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);

            // Monta a estrutura correta para salvar no Banco de dados da Alpha Vet
            const dadosPedido = {
                cliente_nome: nomeCliente,       // Envia o nome digitado
                cliente_endereco: enderecoCliente, // Envia o endereço digitado
                total: totalNumerico,             // Envia o preço no campo correto da API
                status: "Pendente",
                itens: JSON.stringify(carrinho.map(item => ({
                    nome: item.nome,
                    quantidade: item.quantidade,
                    preco: item.preco
                })))
            };

            try {
                const response = await fetch('https://backend-alphavet.vercel.app/api/pedidos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dadosPedido)
                });

                if (!response.ok) {
                    throw new Error('Falha ao registrar o pedido no servidor.');
                }

                // Reseta a interface local do carrinho
                carrinho = [];
                atualizarCarrinho();
                document.getElementById('cliente-nome').value = '';
                document.getElementById('cliente-endereco').value = '';
                fecharModalCarrinho();

                // Redireciona direto para a listagem
                window.location.href = "pedidos.html";

            } catch (erro) {
                console.error("Erro API Alpha Vet:", erro);
                alert("Ocorreu um erro ao enviar o pedido. Verifique a conexão.");
            }
        }

        // Inicializa o catálogo ao abrir a tela
        carregarCategoria();

        // Configuração do Service Worker para o PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado!', reg))
                    .catch(err => console.error('Erro SW:', err));
            });
        }
    </script>
</body>

</html>
